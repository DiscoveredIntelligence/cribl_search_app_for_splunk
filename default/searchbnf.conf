##################
# criblsearch
##################

[criblsearch-command]
syntax = criblsearch query=<string> (<criblsearch-options>)*
simplesyntax = criblsearch query="<query>" (sourcetype=<string>)? (log_level=<loglevel>)? (cribl_endpoint=<string>)? (statistics_mode=<boolean>)?
shortdesc = Execute a search query against Cribl Search datasets and return results
description = Dispatches a search query to remotely execute in Cribl Search - Cloud or On-premises \
and return results containing events matching the search criteria. This command allows you to \
query datasets stored in Cribl Search with complete query syntax support. \
\p\ \
The criblsearch command supports multiple Cribl endpoints with endpoint-specific credential \
configuration. Returned events can be assigned custom sourcetypes and filtered by group. Control \
logging level and output format for aggregation queries. \
\p\ \
Results are automatically enriched with standard Splunk fields including _time, _raw, host, source, \
and sourcetype. Internal command logs are written to the '_internal' index.
usage = public
tags = cribl search remote query dataset cloud
example1 = | criblsearch query="cribl dataset=example-s3-bucket '1.1.1.1'" log_level="INFO" cribl_endpoint="cribl_default" sourcetype="criblsearch:cmd:events"
comment1 = Search for events containing the IP 1.1.1.1 against the Cribl S3 dataset.   Run with INFO level logging and assign a custom sourcetype to returned events for easier categorization in Splunk searching against the cribl_default endpoint defined in the App settings. 
example2 = | criblsearch query="cribl dataset=example-s3-bucket '1.1.1.1'" sourcetype="security:logs" log_level="DEBUG"
comment2 = Search with custom sourcetype assignment and DEBUG level logging to troubleshoot

[criblsearch-options]
syntax = (sourcetype=<string>) | (log_level=<loglevel>) | (cribl_endpoint=<string>) | (statistics_mode=<boolean>)
description = Optional parameters to control query execution, output formatting, and logging behavior. \
\p\ \
SOURCETYPE: Assign or override the sourcetype field for all returned events. Assignment follows \
this priority: (1) If specified, all events use this value; (2) Otherwise preserve existing sourcetype \
from Cribl; (3) If missing, assign 'criblsearch:cmd:events'. Use to categorize events into your \
Splunk knowledge objects and CIMs. \
\p\ \
LOG_LEVEL: Set logging verbosity for command execution logs written to '_internal' index. Valid \
values: INFO (default), DEBUG, WARN, ERROR. Use DEBUG for detailed troubleshooting when queries \
fail or return unexpected results. \
\p\ \
CRIBL_ENDPOINT: Specify which configured endpoint to use. Required when multiple Cribl endpoints \
are configured. If only one endpoint exists or parameter is omitted, uses the default endpoint. \
Endpoint names are configured in the TA settings interface. \

[loglevel]
syntax = INFO | DEBUG | WARN | ERROR
description = Logging level for command execution.

[boolean]
syntax = true | false
description = Boolean value.
